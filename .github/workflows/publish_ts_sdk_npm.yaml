name: publish-typescript-sdk-npm

# This workflow publishes the Weave TypeScript SDK package to npm.
# It runs package validation checks before publishing.

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag to publish under"
        required: true
        type: choice
        options:
          - latest
          - next
        default: latest

jobs:
  publish-typescript-sdk:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-8core
    timeout-minutes: 15
    environment:
      name: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.8.1
          run_install: false

      - id: package_meta
        run: |
          PACKAGE_NAME=$(node -p "require('./sdks/node/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./sdks/node/package.json').version")
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version is not already published
        env:
          PACKAGE_NAME: ${{ steps.package_meta.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.package_meta.outputs.package_version }}
        run: |
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "Version ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm."
            exit 1
          fi

      - name: Install dependencies
        working-directory: sdks/node
        run: pnpm install --frozen-lockfile

      # The hostApps Jest project (src/__tests__/hostApps/) spawns the
      # Python Weave trace-server mock via `uv run python -m trace_server_mock`
      # in its globalSetup. uv is required on PATH; uv handles the Python
      # toolchain itself.
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.19"

      - name: Run tests
        working-directory: sdks/node
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: pnpm test

      - name: Run prettier check
        working-directory: sdks/node
        run: pnpm run prettier-check

      - name: Publish to npm
        working-directory: sdks/node
        run: npm publish --access public --provenance --tag "${{ inputs.npm_tag }}"
