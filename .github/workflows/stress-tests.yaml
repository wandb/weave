name: Stress tests (obj_read flake)

# Opt-in stress tests for the publish→ref.get() NotFoundError flake.
# Triggered manually via workflow_dispatch; optionally runs on push to
# branches matching "*/stress-*" for iterative investigation.

on:
  workflow_dispatch:
    inputs:
      repeats:
        description: "Number of full stress-file passes per run"
        required: false
        default: "3"
      python-minor:
        description: "Python 3.x minor version"
        required: false
        default: "10"
  push:
    branches:
      - "**/stress-*"

jobs:
  stress-obj-read:
    name: Stress obj_read flake
    timeout-minutes: 45
    runs-on: ubuntu-latest-8-cores
    services:
      weave_clickhouse:
        image: clickhouse/clickhouse-server:25.11.2.24
        env:
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DB: default
        ports:
          - "8123:8123"
        options: --health-cmd "wget -nv -O- 'http://localhost:8123/ping' || exit 1" --health-interval=5s --health-timeout=3s
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install SQLite dev package
        run: sudo apt update && sudo apt install -y libsqlite3-dev
      - name: Install Libmagic dependency package
        run: sudo apt update && sudo apt install -y libmagic1
      - name: Set up Python 3.${{ github.event.inputs.python-minor || '10' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.${{ github.event.inputs.python-minor || '10' }}"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nox uv
      - name: Run stress tests (ClickHouse)
        env:
          CI: 1
          WF_CLICKHOUSE_HOST: localhost
          WEAVE_SERVER_DISABLE_ECOSYSTEM: 1
          DD_TRACE_ENABLED: false
          OPENAI_API_KEY: sk-1234567890abcdef1234567890abcdef
          REPEATS: ${{ github.event.inputs.repeats || '3' }}
        run: |
          set -euxo pipefail
          # Repeat the stress file several times per job so a single run
          # amortizes enough publish/get cycles to surface a rare race.
          for i in $(seq 1 "${REPEATS}"); do
            echo "=== stress pass ${i}/${REPEATS} ==="
            nox -e "tests-3.${{ github.event.inputs.python-minor || '10' }}(shard='trace')" -- \
              --run-stress \
              -m "stress" \
              -p no:cacheprovider \
              -o log_cli=true \
              -o log_cli_level=INFO \
              tests/trace/test_obj_read_stress.py
          done
      - name: Upload pytest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-pytest-logs
          path: |
            **/.pytest_cache
            **/pytest.log
          retention-days: 7
          if-no-files-found: ignore
