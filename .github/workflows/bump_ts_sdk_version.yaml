name: bump-typescript-sdk-version

# This workflow bumps the version of the Weave TypeScript SDK package.
# It updates `sdks/node/package.json` and the lockstep constant in
# `sdks/node/src/utils/packageVersion.ts`, creates a commit, and pushes it.
#
# packageVersion.ts is hardcoded (not codegen) so the source compiles cleanly
# to both CJS and ESM without `__dirname` / `import.meta.url` gymnastics. The
# tradeoff is that the version lives in two places; this workflow is what keeps
# them in sync.

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semver segment to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  bump-ts-sdk-version:
    name: Bump TypeScript SDK Version
    runs-on: ubuntu-8core
    timeout-minutes: 10
    environment:
      name: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.WANDBOT_3000_APP_ID }}
          private-key: ${{ secrets.WANDBOT_3000_PRIVATE_KEY }}
          owner: wandb
          repositories: weave
          permission-contents: write

      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - id: setup_git
        run: |
          git config --global user.name 'Weave Build Bot'
          git config --global user.email weave@wandb.com

      - id: bump_version
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const packageJsonPath = 'sdks/node/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          const currentVersion = packageJson.version;

          const match = currentVersion.match(/^(\d+)\.(\d+)\.(\d+)$/);
          if (!match) {
            throw new Error(
              `Unsupported version format: "${currentVersion}". Expected X.Y.Z`
            );
          }

          let major = Number(match[1]);
          let minor = Number(match[2]);
          let patch = Number(match[3]);
          const bumpType = process.env.BUMP_TYPE;

          if (bumpType === 'major') {
            major += 1;
            minor = 0;
            patch = 0;
          } else if (bumpType === 'minor') {
            minor += 1;
            patch = 0;
          } else if (bumpType === 'patch') {
            patch += 1;
          } else {
            throw new Error(`Unsupported bump type: "${bumpType}"`);
          }

          const nextVersion = `${major}.${minor}.${patch}`;
          packageJson.version = nextVersion;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);

          // Keep src/utils/packageVersion.ts in lockstep with package.json.
          // The file is owned by this workflow — we rewrite it wholesale on
          // every bump so the constant cannot silently drift from package.json.
          const versionTsPath = 'sdks/node/src/utils/packageVersion.ts';
          const versionTsContent =
            "// Hardcoded version constant. Kept in lockstep with the `version` field in\n" +
            "// package.json by the .github/workflows/bump_ts_sdk_version.yaml workflow,\n" +
            "// which rewrites this whole file on every bump. Do not edit by hand.\n" +
            "//\n" +
            "// Lives as a constant — rather than being read from package.json at runtime —\n" +
            "// so the source compiles cleanly to both CJS and ESM without needing\n" +
            "// `__dirname` (CJS-only) or `import.meta.url` (ESM-only).\n" +
            `export const packageVersion = '${nextVersion}';\n`;
          fs.writeFileSync(versionTsPath, versionTsContent);

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `old_version=${currentVersion}\nnew_version=${nextVersion}\n`
          );

          console.log(`Bumped TypeScript SDK version: ${currentVersion} -> ${nextVersion}`);
          NODE

      - id: commit_changes
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          if git diff --quiet -- sdks/node/package.json sdks/node/src/utils/packageVersion.ts; then
            echo "No version changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add sdks/node/package.json sdks/node/src/utils/packageVersion.ts
          git commit -m "chore(weave): bump TSSDK version to ${NEW_VERSION}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - id: push_changes
        if: steps.commit_changes.outputs.changed == 'true'
        run: git push
